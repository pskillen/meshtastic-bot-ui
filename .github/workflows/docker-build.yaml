name: docker-build-and-push

on:
  workflow_call:
    inputs:
      VERSION_LABEL:
        required: true
        type: string
      ENVIRONMENT:
        required: true
        type: string
        description: "dev | preprod | prod"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.ENVIRONMENT == 'dev' && 'latest-dev' || inputs.VERSION_LABEL }}
          build-args: |
            VERSION=${{ inputs.VERSION_LABEL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tagging:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: inputs.ENVIRONMENT != 'dev'

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag for pre-release (latest-rc)
        if: inputs.ENVIRONMENT == 'preprod'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest-rc \
            ghcr.io/${{ github.repository }}:${{ inputs.VERSION_LABEL }}

      - name: Tag for release (latest + semver components)
        if: inputs.ENVIRONMENT == 'prod'
        run: |
          VERSION="${{ inputs.VERSION_LABEL }}"
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:${VERSION} \
            ghcr.io/${{ github.repository }}:${VERSION}
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${MAJOR} \
            ghcr.io/${{ github.repository }}:${VERSION}
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${MAJOR}.${MINOR} \
            ghcr.io/${{ github.repository }}:${VERSION}

  cleanup:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - tagging
    if: always() && !cancelled() && needs.build-and-push.result == 'success'
    steps:
      - name: Delete untagged images
        uses: Chizkiyahu/delete-untagged-ghcr-action@v6.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository_owner: ${{ github.repository_owner }}
          package_name: meshtastic-bot-ui
          owner_type: user
          untagged_only: true
